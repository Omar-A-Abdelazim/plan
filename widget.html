<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PlanFlow — Pomodoro Widget</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Noto+Naskh+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      /* Dark mode colors from globals.css */
      --background: #1f1f2e;
      --foreground: #e8e8f0;
      --muted: #38384a;
      --muted-foreground: #a6a6b8;
      --primary: #9d7ce8;
      --secondary: #5a9fd4;
      --accent: #fbbf24;
      --border: #3f3f52;
      --card: #282839;
    }

    html, body {
      background: rgba(15, 15, 26, 0.45);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      overflow: hidden;
      user-select: none;
      -webkit-font-smoothing: antialiased;
      font-family: 'Geist', system-ui, -apple-system, sans-serif;
      color: var(--foreground);
      margin: 0;
      padding: 0;
      height: 100vh;
      width: 100vw;
    }

    .card {
      width: 100%;
      height: 100%;
      background: rgba(15, 15, 26, 0.45);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(123, 47, 190, 0.3);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.08);
      -webkit-app-region: drag;
      display: flex;
      flex-direction: column;
    }

    /* ══════════════════════════════════════════════════
       COMPACT MODE (Timer + Quote + Expand)
       ══════════════════════════════════════════════════ */

    .compact-view {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: clamp(12px, 5%, 20px);
      gap: clamp(8px, 3%, 16px);
      -webkit-app-region: drag;
      min-height: 180px;
    }

    .compact-timer {
      font-size: clamp(36px, 12vw, 64px);
      font-weight: 700;
      letter-spacing: -2px;
      font-variant-numeric: tabular-nums;
      line-height: 1;
      text-align: center;
      transition: color 0.3s ease;
      flex-shrink: 0;
    }

    .compact-timer.work { color: #c39af0; }
    .compact-timer.shortBreak { color: #7ec8f7; }
    .compact-timer.longBreak { color: #fbb96b; }

    .compact-quote {
      font-size: clamp(11px, 2vw, 14px);
      color: var(--muted-foreground);
      line-height: 1.5;
      text-align: center;
      font-style: italic;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
      max-width: 100%;
      padding: 0 8px;
    }

    .compact-actions {
      display: flex;
      gap: 8px;
      align-items: center;
      justify-content: center;
      -webkit-app-region: no-drag;
      flex-shrink: 0;
    }

    .icon-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border: none;
      border-radius: 8px;
      background: rgba(255,255,255,0.06);
      color: var(--muted-foreground);
      cursor: pointer;
      transition: all 0.2s ease;
      -webkit-app-region: no-drag;
    }

    .icon-btn:hover {
      color: var(--foreground);
      background: rgba(255,255,255,0.12);
    }

    .icon-btn svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }

    /* ══════════════════════════════════════════════════
       FULL MODE (Complete Pomodoro Interface)
       ══════════════════════════════════════════════════ */

    .full-view {
      display: none;
      width: 100%;
      height: 100%;
      flex-direction: column;
      padding: clamp(16px, 4%, 24px);
      gap: clamp(12px, 2%, 20px);
      overflow-y: auto;
      overflow-x: hidden;
      min-height: 180px;
    }

    .full-view.active {
      display: flex;
    }

    /* Header with Mode Tabs */
    .mode-tabs {
      display: flex;
      gap: clamp(6px, 1.5%, 8px);
      flex-wrap: wrap;
      align-items: center;
      min-height: 32px;
    }

    .mode-tab {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: clamp(6px, 1%, 8px) clamp(10px, 2%, 14px);
      border: none;
      border-radius: 8px;
      font-size: clamp(12px, 2vw, 13px);
      font-weight: 500;
      background: transparent;
      color: var(--muted-foreground);
      cursor: pointer;
      transition: all 0.2s ease;
      -webkit-app-region: no-drag;
      white-space: nowrap;
    }

    .mode-tab:hover {
      background: rgba(255,255,255,0.05);
    }

    .mode-tab.active {
      background: rgba(139, 92, 246, 0.15);
      color: #c39af0;
    }

    .mode-tab.active.secondary {
      background: rgba(59, 130, 246, 0.15);
      color: #7ec8f7;
    }

    .mode-tab.active.accent {
      background: rgba(251, 191, 36, 0.15);
      color: #fbb96b;
    }

    .mode-tab svg {
      width: 16px;
      height: 16px;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }

    /* Quote Section */
    .quote-section {
      display: none;
      text-align: center;
      animation: fadeIn 0.3s ease;
      min-height: 60px;
    }

    .quote-section.visible {
      display: block;
    }

    .quote-label {
      font-size: clamp(10px, 1.5vw, 11px);
      color: var(--muted-foreground);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .quote-label svg {
      width: 14px;
      height: 14px;
      fill: #c39af0;
      flex-shrink: 0;
    }

    .quote-text {
      font-size: clamp(13px, 2vw, 15px);
      font-style: italic;
      color: var(--foreground);
      line-height: 1.6;
      margin-bottom: 6px;
    }

    .quote-author {
      font-size: clamp(10px, 1.5vw, 11px);
      color: var(--muted-foreground);
    }

    /* Timer Display with SVG Ring */
    .timer-display {
      position: relative;
      width: clamp(120px, 30vw, 160px);
      height: clamp(120px, 30vw, 160px);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: clamp(8px, 2%, 16px) 0;
      flex-shrink: 0;
    }

    .timer-ring {
      position: absolute;
      width: 100%;
      height: 100%;
    }

    .timer-ring svg {
      width: 100%;
      height: 100%;
      filter: drop-shadow(0 0 8px rgba(139, 92, 246, 0.15));
    }

    .timer-bg-ring {
      fill: none;
      stroke: rgba(139, 92, 246, 0.1);
      stroke-width: 2;
    }

    .timer-progress-ring {
      fill: none;
      stroke: #c39af0;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-dasharray: 282;
      stroke-dashoffset: 282;
      transition: stroke-dashoffset 0.3s ease, stroke 0.3s ease;
      transform-origin: 50% 50%;
      transform: rotate(-90deg);
    }

    .timer-progress-ring.secondary { stroke: #7ec8f7; }
    .timer-progress-ring.accent { stroke: #fbb96b; }

    .timer-text {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
    }

    .timer-time {
      font-size: clamp(28px, 8vw, 42px);
      font-weight: 700;
      letter-spacing: -1.5px;
      font-variant-numeric: tabular-nums;
      line-height: 1;
      color: #c39af0;
      transition: color 0.3s ease;
    }

    .timer-time.secondary { color: #7ec8f7; }
    .timer-time.accent { color: #fbb96b; }

    .timer-session {
      font-size: clamp(10px, 1.5vw, 11px);
      color: var(--muted-foreground);
    }

    /* Controls */
    .controls {
      display: flex;
      gap: clamp(8px, 2%, 12px);
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      min-height: 56px;
    }

    .control-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: clamp(36px, 8vw, 44px);
      height: clamp(36px, 8vw, 44px);
      border: none;
      border-radius: 50%;
      background: rgba(255,255,255,0.06);
      color: var(--muted-foreground);
      cursor: pointer;
      transition: all 0.2s ease;
      -webkit-app-region: no-drag;
      flex-shrink: 0;
    }

    .control-btn:hover {
      background: rgba(255,255,255,0.12);
      color: var(--foreground);
    }

    .control-btn.play-btn {
      width: clamp(44px, 10vw, 56px);
      height: clamp(44px, 10vw, 56px);
      background: linear-gradient(135deg, #8b5cf6, #3b82f6);
      color: white;
    }

    .control-btn.play-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 8px 24px rgba(139, 92, 246, 0.4);
    }

    .control-btn svg {
      width: clamp(16px, 4vw, 20px);
      height: clamp(16px, 4vw, 20px);
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }

    .control-btn.play-btn svg {
      width: clamp(18px, 5vw, 24px);
      height: clamp(18px, 5vw, 24px);
    }

    /* Stats */
    .stats {
      display: flex;
      justify-content: center;
      gap: clamp(20px, 5%, 40px);
      padding: clamp(12px, 2%, 16px) 0;
      border-top: 1px solid rgba(255,255,255,0.08);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      flex-wrap: wrap;
      min-height: 70px;
    }

    .stat-item {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .stat-value {
      font-size: clamp(20px, 6vw, 28px);
      font-weight: 700;
      color: var(--foreground);
    }

    .stat-label {
      font-size: clamp(10px, 1.5vw, 11px);
      color: var(--muted-foreground);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* Footer */
    .footer {
      display: flex;
      gap: clamp(8px, 2%, 12px);
      align-items: center;
      justify-content: center;
      padding: clamp(8px, 1.5%, 12px) 0;
      flex-wrap: wrap;
      flex-shrink: 0;
    }

    .notification-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: clamp(4px, 1%, 6px) clamp(8px, 1.5%, 12px);
      border: none;
      border-radius: 6px;
      background: transparent;
      color: var(--muted-foreground);
      cursor: pointer;
      font-size: clamp(11px, 1.5vw, 12px);
      font-weight: 500;
      transition: all 0.2s ease;
      -webkit-app-region: no-drag;
      white-space: nowrap;
    }

    .notification-btn:hover {
      color: var(--foreground);
      background: rgba(255,255,255,0.06);
    }

    .notification-btn svg {
      width: clamp(14px, 3vw, 16px);
      height: clamp(14px, 3vw, 16px);
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
      flex-shrink: 0;
    }

    .lang-divider {
      width: 1px;
      height: clamp(12px, 3vw, 16px);
      background: rgba(255,255,255,0.15);
    }

    .lang-toggle {
      display: flex;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px;
      overflow: hidden;
    }

    .lang-toggle button {
      padding: clamp(4px, 1%, 6px) clamp(8px, 1%, 12px);
      border: none;
      background: transparent;
      color: var(--muted-foreground);
      cursor: pointer;
      font-size: clamp(10px, 1.5vw, 11px);
      font-weight: 600;
      transition: all 0.2s ease;
      -webkit-app-region: no-drag;
      white-space: nowrap;
    }

    .lang-toggle button.active {
      background: rgba(139, 92, 246, 0.2);
      color: #c39af0;
    }

    .lang-toggle button:not(.active):hover {
      background: rgba(255,255,255,0.05);
    }

    /* Animations */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(139, 92, 246, 0.3);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(139, 92, 246, 0.5);
    }
  </style>
  </style>
</head>
<body>
<div class="card">
  <!-- COMPACT VIEW: Timer + Quote + Expand Button -->
  <div class="compact-view" id="compactView">
    <div class="compact-timer work" id="cTimer">25:00</div>
    <div class="compact-quote" id="cQuote">"The secret of getting ahead is getting started."</div>
    <div class="compact-actions">
      <button class="icon-btn" id="expandBtn" title="Expand">
        <svg viewBox="0 0 24 24"><polyline points="15 3 21 3 21 9"></polyline><polyline points="9 21 3 21 3 15"></polyline><line x1="21" y1="3" x2="14" y2="10"></line><line x1="3" y1="21" x2="10" y2="14"></line></svg>
      </button>
    </div>
  </div>

  <!-- FULL VIEW: Complete Pomodoro Interface -->
  <div class="full-view" id="fullView">
    <!-- Mode Tabs -->
    <div class="mode-tabs">
      <button class="mode-tab active" id="modeWork" data-mode="work">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"></circle></svg>
        Focus
      </button>
      <button class="mode-tab" id="modeShortBreak" data-mode="shortBreak">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"></path></svg>
        Short Break
      </button>
      <button class="mode-tab" id="modeLongBreak" data-mode="longBreak">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"></path></svg>
        Long Break
      </button>
      <button class="icon-btn" style="margin-left: auto; width: 32px; height: 32px;" id="collapseBtn" title="Collapse">
        <svg viewBox="0 0 24 24"><polyline points="9 3 3 3 3 9"></polyline><polyline points="21 21 21 15 15 15"></polyline><line x1="3" y1="21" x2="10" y2="14"></line><line x1="21" y1="3" x2="14" y2="10"></line></svg>
      </button>
    </div>

    <!-- Quote (Work Mode Only) -->
    <div class="quote-section" id="quoteSection">
      <div class="quote-label">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 21c3 0 7-1 7-8V5c0-1.25-4.716-5-7-5-2.232 0-5 1.757-5 5 0 2 1.238 4.5 3 5.5 1.5 0 2 1 2 2s-.5 2-2 2"></path><path d="M15 21c3 0 7-1 7-8V5c0-1.25-4.716-5-7-5-2.232 0-5 1.757-5 5 0 2 1.238 4.5 3 5.5 1.5 0 2 1 2 2s-.5 2-2 2"></path></svg>
        Focus Quote
      </div>
      <div class="quote-text" id="fQuoteText">"The secret of getting ahead is getting started."</div>
      <div class="quote-author" id="fQuoteAuthor">— Napoleon Hill</div>
    </div>

    <!-- Timer Display -->
    <div class="timer-display">
      <div class="timer-ring">
        <svg viewBox="0 0 100 100">
          <circle class="timer-bg-ring" cx="50" cy="50" r="45"></circle>
          <circle class="timer-progress-ring work" cx="50" cy="50" r="45" id="timerRing"></circle>
        </svg>
      </div>
      <div class="timer-text">
        <div class="timer-time work" id="fTimer">25:00</div>
        <div class="timer-session" id="fSession">Session 1 of 4</div>
      </div>
    </div>

    <!-- Controls -->
    <div class="controls">
      <button class="control-btn" id="fReset" title="Reset">
        <svg viewBox="0 0 24 24"><path d="M1 4v6h6M23 20v-6h-6"></path><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"></path></svg>
      </button>
      <button class="control-btn play-btn" id="fPlay" title="Play/Pause">
        <svg viewBox="0 0 24 24" class="play-icon"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
        <svg viewBox="0 0 24 24" class="pause-icon" style="display: none;"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>
      </button>
    </div>

    <!-- Stats -->
    <div class="stats">
      <div class="stat-item">
        <div class="stat-value" id="pomosCompleted">0</div>
        <div class="stat-label">Pomodoros</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="minutesFocused">0</div>
        <div class="stat-label">Minutes</div>
      </div>
    </div>

    <!-- Footer -->
    <div class="footer">
      <button class="notification-btn" id="notifBtn" title="Notifications">
        <svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
        <span>Notifications</span>
      </button>
      <div class="lang-divider"></div>
      <div class="lang-toggle">
        <button class="active" id="langEn">EN</button>
        <button id="langAr">AR</button>
      </div>
    </div>
  </div>
</div>
<script>
  // ────────────────────────────────────────────────────────────────
  // QUOTES DATABASE
  // ────────────────────────────────────────────────────────────────

  const QUOTES = {
    en: [
      { text: "The secret of getting ahead is getting started.", author: "Napoleon Hill" },
      { text: "Don't watch the clock; do what it does. Keep going.", author: "Sam Levenson" },
      { text: "The only way to do great work is to love what you do.", author: "Steve Jobs" },
      { text: "Focus is the gateway to success.", author: "Brian Tracy" },
      { text: "You don't have to be great to start, but you have to start to be great.", author: "Zig Ziglar" },
      { text: "Success is not final, failure is not fatal.", author: "Winston Churchill" },
      { text: "The future depends on what you do today.", author: "Mahatma Gandhi" },
      { text: "Excellence is not a destination; it is a continuous journey.", author: "Brian Tracy" },
      { text: "Start where you are. Use what you have. Do what you can.", author: "Arthur Ashe" },
    ],
    ar: [
      { text: "سر التقدم هو البدء.", author: "نابليون هيل" },
      { text: "لا تراقب الساعة؛ افعل ما تفعله. استمر.", author: "سام ليفنسون" },
      { text: "التركيز هو بوابة النجاح.", author: "برايان تريسي" },
      { text: "العِلمُ نُورٌ وَالجَهلُ ظَلامٌ", author: "حكمة عربية" },
      { text: "الصَّبرُ مِفتاحُ الفَرَج", author: "ابن القيم الجوزية" },
    ],
  };

  // ────────────────────────────────────────────────────────────────
  // STATE
  // ────────────────────────────────────────────────────────────────

  let isCompactMode = true;
  let isRunning = false;
  let currentMode = 'work';
  let language = localStorage.getItem('planflow-widget-language') || 'en';
  let notificationsEnabled = false;

  let timerState = {
    mode: 'work',
    timeRemaining: 25 * 60,
    sessionCount: 0,
    totalSessions: 4,
    isRunning: false,
  };

  let settings = {
    workDuration: 25,
    shortBreakDuration: 5,
    longBreakDuration: 15,
    sessionsBeforeLongBreak: 4,
  };

  let currentQuote = QUOTES[language][Math.floor(Math.random() * QUOTES[language].length)];
  let timerInterval = null;

  // ────────────────────────────────────────────────────────────────
  // DOM REFERENCES
  // ────────────────────────────────────────────────────────────────

  const compactView = document.getElementById('compactView');
  const fullView = document.getElementById('fullView');
  const cTimer = document.getElementById('cTimer');
  const cQuote = document.getElementById('cQuote');
  const expandBtn = document.getElementById('expandBtn');
  const collapseBtn = document.getElementById('collapseBtn');
  const fTimer = document.getElementById('fTimer');
  const fSession = document.getElementById('fSession');
  const fPlay = document.getElementById('fPlay');
  const fReset = document.getElementById('fReset');
  const fQuoteText = document.getElementById('fQuoteText');
  const fQuoteAuthor = document.getElementById('fQuoteAuthor');
  const quoteSection = document.getElementById('quoteSection');
  const notifBtn = document.getElementById('notifBtn');
  const langEn = document.getElementById('langEn');
  const langAr = document.getElementById('langAr');
  const modeWork = document.getElementById('modeWork');
  const modeShortBreak = document.getElementById('modeShortBreak');
  const modeLongBreak = document.getElementById('modeLongBreak');
  const timerRing = document.getElementById('timerRing');
  const pomosCompleted = document.getElementById('pomosCompleted');
  const minutesFocused = document.getElementById('minutesFocused');

  // ────────────────────────────────────────────────────────────────
  // TIMER LOGIC
  // ────────────────────────────────────────────────────────────────

  const formatTime = (seconds) => {
    const mins = Math.floor(seconds / 60);
    const secs = seconds % 60;
    return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
  };

  const getTotalDuration = (mode) => {
    if (mode === 'work') return settings.workDuration * 60;
    if (mode === 'shortBreak') return settings.shortBreakDuration * 60;
    return settings.longBreakDuration * 60;
  };

  const getProgress = () => {
    const total = getTotalDuration(timerState.mode);
    return ((total - timerState.timeRemaining) / total) * 100;
  };

  const updateTimerRing = () => {
    const progress = getProgress();
    const circumference = 2 * Math.PI * 45;
    const offset = circumference * (1 - progress / 100);
    timerRing.style.strokeDashoffset = offset;
  };

  const updateProgress = () => {
    if (timerState.isRunning && timerState.timeRemaining > 0) {
      timerState.timeRemaining--;
      if (timerState.timeRemaining === 0) {
        timerState.isRunning = false;
        nextSession();
      }
    }
  };

  const setMode = (mode) => {
    timerState.mode = mode;
    currentMode = mode;
    const duration = getTotalDuration(mode);
    timerState.timeRemaining = duration;

    // Update mode tabs
    document.querySelectorAll('.mode-tab').forEach(tab => {
      tab.classList.remove('active', 'secondary', 'accent');
      if (tab.getAttribute('data-mode') === mode) {
        tab.classList.add('active');
        if (mode === 'shortBreak') {
          tab.classList.add('secondary');
        } else if (mode === 'longBreak') {
          tab.classList.add('accent');
        }
      }
    });

    updateColors();
    render();
  };

  const updateColors = () => {
    const colorMap = {
      work: 'work',
      shortBreak: 'secondary',
      longBreak: 'accent',
    };
    const colorClass = colorMap[currentMode];

    cTimer.className = `compact-timer ${currentMode}`;
    fTimer.className = `timer-time ${colorClass}`;
    timerRing.className = `timer-progress-ring ${colorClass}`;
  };

  const nextSession = () => {
    if (currentMode === 'work') {
      timerState.sessionCount++;
      if (timerState.sessionCount % settings.sessionsBeforeLongBreak === 0) {
        setMode('longBreak');
      } else {
        setMode('shortBreak');
      }
    } else {
      setMode('work');
    }
  };

  const startTimer = () => {
    timerState.isRunning = true;
    isRunning = true;
    render();
  };

  const pauseTimer = () => {
    timerState.isRunning = false;
    isRunning = false;
    render();
  };

  const resetTimer = () => {
    timerState.isRunning = false;
    timerState.timeRemaining = getTotalDuration(timerState.mode);
    isRunning = false;
    render();
  };

  const togglePlay = () => {
    if (timerState.isRunning) {
      pauseTimer();
    } else {
      startTimer();
    }
  };

  // ────────────────────────────────────────────────────────────────
  // RENDERING
  // ────────────────────────────────────────────────────────────────

  const render = () => {
    const timeStr = formatTime(timerState.timeRemaining);

    // Update timers
    cTimer.textContent = timeStr;
    fTimer.textContent = timeStr;

    // Update session display
    fSession.textContent = `Session ${timerState.sessionCount + 1} of ${timerState.totalSessions}`;

    // Update play button
    const playIcon = fPlay.querySelector('.play-icon');
    const pauseIcon = fPlay.querySelector('.pause-icon');
    if (timerState.isRunning) {
      playIcon.style.display = 'none';
      pauseIcon.style.display = 'block';
    } else {
      playIcon.style.display = 'block';
      pauseIcon.style.display = 'none';
    }

    // Update quote
    cQuote.textContent = `"${currentQuote.text}"`;
    fQuoteText.textContent = `"${currentQuote.text}"`;
    fQuoteAuthor.textContent = `— ${currentQuote.author}`;

    // Show/hide quote in full mode (only in work mode)
    quoteSection.classList.toggle('visible', currentMode === 'work');

    // Update timer ring
    updateTimerRing();
  };

  // ────────────────────────────────────────────────────────────────
  // MODE SWITCHING
  // ────────────────────────────────────────────────────────────────

  const setCompactMode = () => {
    isCompactMode = true;
    compactView.style.display = 'flex';
    fullView.classList.remove('active');
    if (window.electron) {
      window.electron.widgetSetMode('compact');
    }
  };

  const setFullMode = () => {
    isCompactMode = false;
    compactView.style.display = 'none';
    fullView.classList.add('active');
    if (window.electron) {
      window.electron.widgetSetMode('full');
    }
  };

  // ────────────────────────────────────────────────────────────────
  // EVENTS
  // ────────────────────────────────────────────────────────────────

  expandBtn.addEventListener('click', setFullMode);
  collapseBtn.addEventListener('click', setCompactMode);
  fPlay.addEventListener('click', togglePlay);
  fReset.addEventListener('click', resetTimer);

  modeWork.addEventListener('click', () => setMode('work'));
  modeShortBreak.addEventListener('click', () => setMode('shortBreak'));
  modeLongBreak.addEventListener('click', () => setMode('longBreak'));

  notifBtn.addEventListener('click', async () => {
    if ('Notification' in window) {
      if (Notification.permission === 'granted') {
        notificationsEnabled = !notificationsEnabled;
      } else {
        const permission = await Notification.requestPermission();
        notificationsEnabled = permission === 'granted';
      }
      render();
    }
  });

  langEn.addEventListener('click', () => {
    language = 'en';
    langEn.classList.add('active');
    langAr.classList.remove('active');
    localStorage.setItem('planflow-widget-language', 'en');
    currentQuote = QUOTES.en[Math.floor(Math.random() * QUOTES.en.length)];
    render();
  });

  langAr.addEventListener('click', () => {
    language = 'ar';
    langAr.classList.add('active');
    langEn.classList.remove('active');
    localStorage.setItem('planflow-widget-language', 'ar');
    currentQuote = QUOTES.ar[Math.floor(Math.random() * QUOTES.ar.length)];
    render();
  });

  // Set initial language
  if (language === 'ar') {
    langAr.classList.add('active');
    langEn.classList.remove('active');
  }

  // ────────────────────────────────────────────────────────────────
  // TIMER INTERVAL
  // ────────────────────────────────────────────────────────────────

  setInterval(() => {
    updateProgress();
    render();
  }, 1000);

  // ────────────────────────────────────────────────────────────────
  // INITIALIZATION
  // ────────────────────────────────────────────────────────────────

  updateColors();
  render();
</script>
</body>
</html>
