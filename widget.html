<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pomodoro Widget</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Noto+Naskh+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #1f1f2e;
      --bg-secondary: #282839;
      --fg: #e8e8f0;
      --fg-muted: #a6a6b8;
      --border: #3f3f52;
      --primary: #c39af0;
      --primary-light: rgba(195, 154, 240, 0.1);
      --secondary: #7ec8f7;
      --secondary-light: rgba(126, 200, 247, 0.1);
      --accent: #fbb96b;
      --accent-light: rgba(251, 185, 107, 0.1);
    }

    html, body {
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--fg);
      font-family: 'Geist', system-ui, -apple-system, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      overflow: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
      padding: clamp(12px, 3%, 16px);
      gap: clamp(12px, 2%, 14px);
      height: 100%;
      -webkit-user-select: none;
      user-select: none;
    }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       HEADER (DRAGGABLE)
       ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
      -webkit-app-region: drag;
      cursor: move;
    }

    .title {
      font-size: 12px;
      font-weight: 600;
      color: var(--fg-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .close-btn {
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--fg-muted);
      cursor: pointer;
      transition: all 0.2s ease;
      -webkit-app-region: no-drag;
      font-size: 16px;
      line-height: 1;
    }

    .close-btn:hover {
      background: rgba(255, 255, 255, 0.05);
      color: var(--fg);
    }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       TIMER SECTION
       ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */

    .timer-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }

    .session-mode {
      font-size: 11px;
      color: var(--fg-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 600;
    }

    .timer-display {
      font-size: 48px;
      font-weight: 700;
      letter-spacing: -1.5px;
      font-variant-numeric: tabular-nums;
      line-height: 1;
      color: var(--primary);
      transition: color 0.3s ease;
    }

    .timer-display.short-break {
      color: var(--secondary);
    }

    .timer-display.long-break {
      color: var(--accent);
    }

    .session-info {
      font-size: 11px;
      color: var(--fg-muted);
      font-weight: 500;
    }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       CONTROLS
       ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */

    .controls {
      display: flex;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
      flex-shrink: 0;
      -webkit-app-region: no-drag;
    }

    .btn {
      padding: 6px 12px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--fg-muted);
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      transition: all 0.2s ease;
      -webkit-app-region: no-drag;
    }

    .btn:hover {
      background: var(--border);
      color: var(--fg);
    }

    .btn.primary {
      background: linear-gradient(135deg, #8b5cf6, #3b82f6);
      color: white;
      font-weight: 600;
      border: none;
    }

    .btn.primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(139, 92, 246, 0.3);
    }

    .btn:active {
      transform: scale(0.98);
    }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       QUOTE SECTION
       ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */

    .quote-section {
      background: var(--primary-light);
      border: 1px solid rgba(195, 154, 240, 0.2);
      border-radius: 6px;
      padding: 8px;
      font-size: 11px;
      line-height: 1.4;
      color: var(--fg);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      flex-shrink: 0;
    }

    .quote-section.short-break {
      background: var(--secondary-light);
      border-color: rgba(126, 200, 247, 0.2);
    }

    .quote-section.long-break {
      background: var(--accent-light);
      border-color: rgba(251, 185, 107, 0.2);
    }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       TASKS SECTION
       ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */

    .tasks-wrapper {
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    .tasks-header {
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      padding: 4px 0;
      transition: all 0.2s ease;
      flex-shrink: 0;
      -webkit-app-region: no-drag;
    }

    .tasks-header:hover {
      color: var(--primary);
    }

    .tasks-toggle {
      width: 16px;
      height: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      flex-shrink: 0;
    }

    .tasks-toggle.expanded {
      transform: rotate(90deg);
    }

    .tasks-toggle svg {
      width: 100%;
      height: 100%;
      stroke: currentColor;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }

    .tasks-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--fg);
    }

    .tasks-container {
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .tasks-container.expanded {
      max-height: 200px;
      overflow-y: auto;
    }

    .task-input-group {
      display: flex;
      gap: 6px;
      -webkit-app-region: no-drag;
    }

    .task-input {
      flex: 1;
      min-width: 0;
      padding: 6px 8px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--bg-secondary);
      color: var(--fg);
      font-size: 12px;
      font-family: inherit;
      outline: none;
      transition: all 0.2s ease;
      -webkit-app-region: no-drag;
    }

    .task-input:focus {
      outline: none;
      border-color: var(--primary);
      background: rgba(195, 154, 240, 0.05);
    }

    .task-input::placeholder {
      color: var(--fg-muted);
    }

    .task-add-btn {
      padding: 6px 12px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      transition: all 0.2s ease;
      -webkit-app-region: no-drag;
    }

    .task-add-btn:hover {
      background: rgba(195, 154, 240, 0.9);
      transform: translateY(-1px);
    }

    .task-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
      overflow-y: auto;
    }

    .task-item {
      display: flex;
      align-items: flex-start;
      gap: 6px;
      padding: 6px;
      border-radius: 4px;
      background: var(--bg-secondary);
      transition: all 0.2s ease;
      -webkit-app-region: no-drag;
    }

    .task-item:hover {
      background: var(--border);
    }

    .task-checkbox {
      width: 16px;
      height: 16px;
      min-width: 16px;
      margin-top: 1px;
      cursor: pointer;
      accent-color: var(--primary);
      -webkit-app-region: no-drag;
    }

    .task-text {
      flex: 1;
      min-width: 0;
      font-size: 11px;
      color: var(--fg);
      word-break: break-word;
      transition: all 0.2s ease;
    }

    .task-item.completed .task-text {
      color: var(--fg-muted);
      text-decoration: line-through;
    }

    .task-delete {
      width: 16px;
      height: 16px;
      min-width: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      background: transparent;
      color: var(--fg-muted);
      cursor: pointer;
      padding: 0;
      border-radius: 2px;
      transition: all 0.2s ease;
      flex-shrink: 0;
      -webkit-app-region: no-drag;
      font-size: 14px;
      line-height: 1;
    }

    .task-delete:hover {
      background: rgba(255, 0, 0, 0.15);
      color: #ff6b6b;
    }

    .empty-tasks {
      text-align: center;
      padding: 8px;
      color: var(--fg-muted);
      font-size: 11px;
    }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       FOOTER
       ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */

    .footer {
      display: flex;
      justify-content: center;
      gap: 6px;
      flex-wrap: wrap;
      flex-shrink: 0;
      padding-top: 8px;
      border-top: 1px solid var(--border);
    }

    .language-toggle {
      display: flex;
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
    }

    .lang-btn {
      padding: 4px 10px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--fg-muted);
      border-radius: 4px;
      cursor: pointer;
      font-size: 11px;
      font-weight: 600;
      transition: all 0.2s ease;
      -webkit-app-region: no-drag;
    }

    .lang-btn.active {
      background: var(--primary-light);
      color: var(--primary);
      border-color: var(--primary);
    }

    .lang-btn:hover:not(.active) {
      background: var(--bg-secondary);
    }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       SCROLLBAR
       ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */

    ::-webkit-scrollbar {
      width: 5px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(195, 154, 240, 0.3);
      border-radius: 2px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(195, 154, 240, 0.5);
    }
  </style>
</head>
<body>
  <!-- Header -->
  <div class="header">
    <div class="title">Pomodoro</div>
    <button class="close-btn" id="closeBtn">×</button>
  </div>

  <!-- Timer -->
  <div class="timer-section">
    <div class="session-mode" id="sessionMode">Focus Session</div>
    <div class="timer-display" id="timerDisplay">25:00</div>
    <div class="session-info" id="sessionInfo">Session 1 of 4</div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <button class="btn primary" id="playBtn">Start</button>
    <button class="btn" id="pauseBtn" style="display: none;">Pause</button>
    <button class="btn" id="resetBtn">Reset</button>
  </div>

  <!-- Quote -->
  <div class="quote-section" id="quoteSection">"The secret of getting ahead is getting started."</div>

  <!-- Tasks -->
  <div class="tasks-wrapper">
    <div class="tasks-header" id="tasksHeader">
      <div class="tasks-toggle" id="tasksToggle">
        <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"></polyline></svg>
      </div>
      <div class="tasks-label">Tasks</div>
    </div>

    <div class="tasks-container" id="tasksContainer">
      <div class="task-input-group">
        <input type="text" class="task-input" id="taskInput" placeholder="Add task..." autocomplete="off" />
        <button class="task-add-btn" id="addTaskBtn">Add</button>
      </div>

      <div class="task-list" id="taskList">
        <div class="empty-tasks">No tasks yet</div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <div class="language-toggle">
      <button class="lang-btn active" id="langEn">EN</button>
      <button class="lang-btn" id="langAr">AR</button>
    </div>
  </div>

  <script>
    // ─────────────────────────────────────────────────────────────
    // QUOTES
    // ─────────────────────────────────────────────────────────────

    const QUOTES = {
      en: [
        "The secret of getting ahead is getting started.",
        "Don't watch the clock; do what it does. Keep going.",
        "The only way to do great work is to love what you do.",
        "Focus is the gateway to success.",
        "You don't have to be great to start, but you have to start to be great.",
        "Success is not final, failure is not fatal.",
        "The future depends on what you do today.",
        "Excellence is not a destination; it is a continuous journey.",
        "Start where you are. Use what you have. Do what you can.",
      ],
      ar: [
        "سر التقدم هو البدء.",
        "التركيز هو بوابة النجاح.",
        "العِلمُ نُورٌ وَالجَهلُ ظَلامٌ",
        "الصَّبرُ مِفتاحُ الفَرَج",
        "من جَدَّ وَجَد، وَمَن زَرَعَ حَصَد",
      ],
    };

    // ─────────────────────────────────────────────────────────────
    // STATE
    // ─────────────────────────────────────────────────────────────

    let widgetState = {
      timerState: {
        mode: 'work',
        timeRemaining: 25 * 60,
        isRunning: false,
        sessionCount: 0,
        totalSessions: 4,
      },
      settings: {
        workDuration: 25,
        shortBreakDuration: 5,
        longBreakDuration: 15,
        sessionsBeforeLongBreak: 4,
      },
      currentQuote: null,
      tasks: [],
      language: localStorage.getItem('pomodoro-language') || 'en',
    };

    const config = {
      work: { duration: 25 * 60, label: 'Focus Session', className: '' },
      shortBreak: { duration: 5 * 60, label: 'Short Break', className: 'short-break' },
      longBreak: { duration: 15 * 60, label: 'Long Break', className: 'long-break' },
    };

    let currentQuote = QUOTES[widgetState.language][0];
    let timerInterval = null;

    // ─────────────────────────────────────────────────────────────
    // DOM REFERENCES
    // ─────────────────────────────────────────────────────────────

    const closeBtn = document.getElementById('closeBtn');
    const sessionMode = document.getElementById('sessionMode');
    const timerDisplay = document.getElementById('timerDisplay');
    const sessionInfo = document.getElementById('sessionInfo');
    const playBtn = document.getElementById('playBtn');
    const pauseBtn = document.getElementById('pauseBtn');
    const resetBtn = document.getElementById('resetBtn');
    const quoteSection = document.getElementById('quoteSection');
    const tasksHeader = document.getElementById('tasksHeader');
    const tasksToggle = document.getElementById('tasksToggle');
    const tasksContainer = document.getElementById('tasksContainer');
    const taskInput = document.getElementById('taskInput');
    const addTaskBtn = document.getElementById('addTaskBtn');
    const taskList = document.getElementById('taskList');
    const langEn = document.getElementById('langEn');
    const langAr = document.getElementById('langAr');

    // ─────────────────────────────────────────────────────────────
    // HELPERS
    // ─────────────────────────────────────────────────────────────

    const formatTime = (seconds) => {
      const mins = Math.floor(seconds / 60);
      const secs = seconds % 60;
      return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
    };

    const getRandomQuote = () => {
      const pool = QUOTES[widgetState.language];
      return pool[Math.floor(Math.random() * pool.length)];
    };

    // ─────────────────────────────────────────────────────────────
    // TIMER FUNCTIONS
    // ─────────────────────────────────────────────────────────────

    const startTimer = () => {
      if (widgetState.timerState.isRunning) return;
      widgetState.timerState.isRunning = true;
      timerInterval = setInterval(() => {
        if (widgetState.timerState.timeRemaining > 0) {
          widgetState.timerState.timeRemaining--;
          render();
        } else {
          clearInterval(timerInterval);
          nextSession();
        }
      }, 1000);
      render();
    };

    const pauseTimer = () => {
      widgetState.timerState.isRunning = false;
      if (timerInterval) clearInterval(timerInterval);
      render();
    };

    const resetTimer = () => {
      widgetState.timerState.isRunning = false;
      if (timerInterval) clearInterval(timerInterval);
      widgetState.timerState.mode = 'work';
      widgetState.timerState.timeRemaining = widgetState.settings.workDuration * 60;
      widgetState.timerState.sessionCount = 0;
      currentQuote = getRandomQuote();
      render();
    };

    const nextSession = () => {
      if (widgetState.timerState.mode === 'work') {
        widgetState.timerState.sessionCount++;
        widgetState.timerState.mode = widgetState.timerState.sessionCount % widgetState.timerState.totalSessions === 0 ? 'longBreak' : 'shortBreak';
      } else {
        widgetState.timerState.mode = 'work';
      }
      widgetState.timerState.timeRemaining = config[widgetState.timerState.mode].duration;
      currentQuote = getRandomQuote();
      render();
    };

    // ─────────────────────────────────────────────────────────────
    // TASKS
    // ─────────────────────────────────────────────────────────────

    const saveTasks = () => {
      localStorage.setItem('pomodoro-tasks', JSON.stringify(widgetState.tasks));
    };

    const addTask = () => {
      const text = taskInput.value.trim();
      if (!text) return;
      const task = {
        id: Date.now().toString(),
        text,
        completed: false,
      };
      widgetState.tasks.push(task);
      saveTasks();
      taskInput.value = '';
      render();
    };

    const deleteTask = (id) => {
      widgetState.tasks = widgetState.tasks.filter(t => t.id !== id);
      saveTasks();
      render();
    };

    const toggleTask = (id) => {
      const task = widgetState.tasks.find(t => t.id === id);
      if (task) {
        task.completed = !task.completed;
        saveTasks();
        render();
      }
    };

    // ─────────────────────────────────────────────────────────────
    // LANGUAGE
    // ─────────────────────────────────────────────────────────────

    const setLanguage = (lang) => {
      widgetState.language = lang;
      localStorage.setItem('pomodoro-language', lang);
      currentQuote = getRandomQuote();
      render();
    };

    // ─────────────────────────────────────────────────────────────
    // RENDERING
    // ─────────────────────────────────────────────────────────────

    const render = () => {
      const { timerState, settings } = widgetState;
      const modeConfig = config[timerState.mode];

      // Update timer display
      sessionMode.textContent = modeConfig.label;
      timerDisplay.textContent = formatTime(timerState.timeRemaining);
      timerDisplay.className = `timer-display ${modeConfig.className}`;
      sessionInfo.textContent = `Session ${timerState.sessionCount + 1} of ${timerState.totalSessions}`;

      // Update quote
      if (timerState.mode === 'work') {
        quoteSection.textContent = currentQuote;
        quoteSection.className = `quote-section ${modeConfig.className}`;
      }

      // Update controls
      if (timerState.isRunning) {
        playBtn.style.display = 'none';
        pauseBtn.style.display = 'block';
      } else {
        playBtn.style.display = 'block';
        pauseBtn.style.display = 'none';
      }

      // Update task list
      if (widgetState.tasks.length === 0) {
        taskList.innerHTML = '<div class="empty-tasks">No tasks yet</div>';
      } else {
        taskList.innerHTML = widgetState.tasks.map(task => `
          <div class="task-item ${task.completed ? 'completed' : ''}">
            <input type="checkbox" class="task-checkbox" ${task.completed ? 'checked' : ''} onchange="toggleTask('${task.id}')" />
            <div class="task-text">${task.text}</div>
            <button class="task-delete" onclick="deleteTask('${task.id}')">×</button>
          </div>
        `).join('');
      }

      // Update language buttons
      langEn.classList.toggle('active', widgetState.language === 'en');
      langAr.classList.toggle('active', widgetState.language === 'ar');
    };

    // ─────────────────────────────────────────────────────────────
    // EVENT LISTENERS
    // ─────────────────────────────────────────────────────────────

    closeBtn.addEventListener('click', () => {
      window.electronAPI.closeWidget();
    });

    playBtn.addEventListener('click', startTimer);
    pauseBtn.addEventListener('click', pauseTimer);
    resetBtn.addEventListener('click', resetTimer);

    addTaskBtn.addEventListener('click', addTask);
    taskInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') addTask();
    });

    tasksHeader.addEventListener('click', () => {
      tasksContainer.classList.toggle('expanded');
      tasksToggle.classList.toggle('expanded');
    });

    langEn.addEventListener('click', () => setLanguage('en'));
    langAr.addEventListener('click', () => setLanguage('ar'));

    // ─────────────────────────────────────────────────────────────
    // IPC LISTENERS
    // ─────────────────────────────────────────────────────────────

    if (window.electronAPI) {
      window.electronAPI.onWidgetStateUpdate((state) => {
        widgetState = state;
        currentQuote = widgetState.currentQuote || getRandomQuote();
        render();
      });
    }

    // Initial render
    render();
  </script>
</body>
</html>
