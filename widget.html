<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PlanFlow — Pomodoro Widget</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-primary: #0f0f1a;
      --bg-secondary: #1a1a2e;
      --bg-tertiary: #252538;
      --fg-primary: #e8e8f0;
      --fg-secondary: #a6a6b8;
      --fg-muted: #7a7a8e;
      --accent-primary: #8b5cf6;
      --accent-secondary: #6366f1;
      --accent-tertiary: #ec4899;
      --border-color: rgba(139, 92, 246, 0.2);
      --shadow-sm: 0 4px 12px rgba(0, 0, 0, 0.15);
      --shadow-md: 0 12px 32px rgba(0, 0, 0, 0.3);
    }

    html, body {
      width: 100%;
      height: 100%;
      background: var(--bg-primary);
      color: var(--fg-primary);
      font-family: 'Geist', -apple-system, system-ui, sans-serif;
      overflow: hidden;
      user-select: none;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      flex-direction: column;
    }

    /* ═══════════════════════════════════════════════════════════════
       CONTAINER & LAYOUT
       ═══════════════════════════════════════════════════════════════ */

    .widget-container {
      display: flex;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .widget-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: rgba(26, 26, 46, 0.6);
      border-bottom: 1px solid var(--border-color);
      -webkit-app-region: drag;
      user-select: none;
    }

    .widget-header-title {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--fg-secondary);
    }

    .header-controls {
      display: flex;
      gap: 8px;
      -webkit-app-region: no-drag;
    }

    .header-btn {
      width: 24px;
      height: 24px;
      border: none;
      border-radius: 4px;
      background: rgba(255, 255, 255, 0.08);
      color: var(--fg-secondary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }

    .header-btn:hover {
      background: rgba(255, 255, 255, 0.12);
      color: var(--fg-primary);
    }

    .header-btn svg {
      width: 14px;
      height: 14px;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }

    /* ═══════════════════════════════════════════════════════════════
       LEFT PANEL - TIMER & CONTROLS
       ═══════════════════════════════════════════════════════════════ */

    .left-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
      gap: 24px;
      border-right: 1px solid var(--border-color);
      overflow-y: auto;
      background: linear-gradient(135deg, rgba(139, 92, 246, 0.05) 0%, transparent 100%);
    }

    .session-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: rgba(139, 92, 246, 0.15);
      border: 1px solid rgba(139, 92, 246, 0.3);
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      color: #c39af0;
    }

    .timer-display {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .timer-value {
      font-size: clamp(48px, 15vw, 96px);
      font-weight: 700;
      letter-spacing: -3px;
      font-variant-numeric: tabular-nums;
      line-height: 1;
      background: linear-gradient(135deg, #8b5cf6, #6366f1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .timer-label {
      font-size: 13px;
      color: var(--fg-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .quote-section {
      max-width: 100%;
      text-align: center;
      padding: 16px;
      background: rgba(139, 92, 246, 0.08);
      border: 1px solid rgba(139, 92, 246, 0.15);
      border-radius: 12px;
      animation: fadeIn 0.4s ease-out;
    }

    .quote-text {
      font-size: 13px;
      font-style: italic;
      color: var(--fg-primary);
      line-height: 1.6;
      margin-bottom: 8px;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .quote-author {
      font-size: 11px;
      color: var(--fg-secondary);
    }

    .controls-group {
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
    }

    .control-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 48px;
      height: 48px;
      border: none;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.08);
      color: var(--fg-primary);
      cursor: pointer;
      transition: all 0.2s ease;
      font-size: 12px;
      font-weight: 500;
      -webkit-app-region: no-drag;
    }

    .control-btn:hover {
      background: rgba(255, 255, 255, 0.15);
      transform: translateY(-2px);
    }

    .control-btn.primary {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
      color: white;
      box-shadow: 0 8px 24px rgba(139, 92, 246, 0.35);
    }

    .control-btn.primary:hover {
      box-shadow: 0 12px 32px rgba(139, 92, 246, 0.45);
      transform: translateY(-2px) scale(1.05);
    }

    .control-btn svg {
      width: 20px;
      height: 20px;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }

    .control-btn.primary svg {
      width: 24px;
      height: 24px;
    }

    /* ═══════════════════════════════════════════════════════════════
       RIGHT PANEL - TASKS SIDEBAR
       ═══════════════════════════════════════════════════════════════ */

    .right-panel {
      width: 240px;
      display: flex;
      flex-direction: column;
      background: rgba(26, 26, 46, 0.4);
      border-left: 1px solid var(--border-color);
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      overflow: hidden;
    }

    .right-panel.collapsed {
      width: 0;
      border-left: none;
      padding: 0;
    }

    .tasks-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      border-bottom: 1px solid var(--border-color);
      -webkit-app-region: drag;
      user-select: none;
    }

    .tasks-header-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--fg-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .collapse-btn {
      width: 24px;
      height: 24px;
      border: none;
      border-radius: 4px;
      background: rgba(255, 255, 255, 0.08);
      color: var(--fg-secondary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
      -webkit-app-region: no-drag;
    }

    .collapse-btn:hover {
      background: rgba(255, 255, 255, 0.12);
      color: var(--fg-primary);
    }

    .collapse-btn svg {
      width: 16px;
      height: 16px;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
      transition: transform 0.3s ease;
    }

    .tasks-content {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .task-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 10px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 8px;
      transition: all 0.2s ease;
      animation: slideIn 0.3s ease-out;
    }

    .task-item:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.12);
    }

    .task-item.completed {
      opacity: 0.6;
    }

    .task-item.completed .task-text {
      text-decoration: line-through;
      color: var(--fg-muted);
    }

    .task-checkbox {
      width: 16px;
      height: 16px;
      min-width: 16px;
      margin-top: 2px;
      cursor: pointer;
      accent-color: var(--accent-primary);
    }

    .task-text {
      flex: 1;
      font-size: 12px;
      line-height: 1.5;
      word-break: break-word;
      color: var(--fg-primary);
      transition: all 0.2s ease;
    }

    .task-delete {
      width: 18px;
      height: 18px;
      min-width: 18px;
      border: none;
      background: transparent;
      color: var(--fg-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: all 0.2s ease;
      -webkit-app-region: no-drag;
    }

    .task-item:hover .task-delete {
      opacity: 1;
      color: #ec4899;
    }

    .task-delete:hover {
      transform: scale(1.1);
    }

    .task-delete svg {
      width: 14px;
      height: 14px;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }

    .tasks-empty {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--fg-muted);
      font-size: 12px;
      text-align: center;
      padding: 20px;
    }

    .add-task-input {
      padding: 10px 12px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 6px;
      color: var(--fg-primary);
      font-size: 12px;
      font-family: inherit;
      outline: none;
      transition: all 0.2s ease;
      margin: 8px 12px 12px;
    }

    .add-task-input:focus {
      background: rgba(255, 255, 255, 0.08);
      border-color: var(--accent-primary);
      box-shadow: 0 0 0 2px rgba(139, 92, 246, 0.2);
    }

    .add-task-input::placeholder {
      color: var(--fg-muted);
    }

    /* ═══════════════════════════════════════════════════════════════
       ANIMATIONS
       ═══════════════════════════════════════════════════════════════ */

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(4px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateX(-8px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    /* ═══════════════════════════════════════════════════════════════
       SCROLLBAR
       ═══════════════════════════════════════════════════════════════ */

    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(139, 92, 246, 0.3);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(139, 92, 246, 0.5);
    }
  </style>
</head>
<body>
  <div class="widget-container">
    <!-- HEADER -->
    <div class="widget-header">
      <div class="widget-header-title">PlanFlow Pomodoro</div>
      <div class="header-controls">
        <button class="header-btn" id="settingsBtn" title="Settings">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>
        </button>
        <button class="header-btn" id="closeBtn" title="Close">
          <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
    </div>

    <!-- LEFT PANEL -->
    <div class="left-panel">
      <div class="session-badge">
        <span id="sessionMode">Focus Session</span>
        <span id="sessionCount">1/4</span>
      </div>

      <div class="timer-display">
        <div class="timer-value" id="timerDisplay">25:00</div>
        <div class="timer-label">Remaining</div>
      </div>

      <div class="quote-section">
        <div class="quote-text" id="quoteText">"The only way to do great work is to love what you do."</div>
        <div class="quote-author" id="quoteAuthor">— Steve Jobs</div>
      </div>

      <div class="controls-group">
        <button class="control-btn primary" id="playBtn" title="Start/Pause">
          <svg viewBox="0 0 24 24" class="play-icon">
            <polygon points="5 3 19 12 5 21 5 3"/>
          </svg>
          <svg viewBox="0 0 24 24" class="pause-icon" style="display: none;">
            <rect x="6" y="4" width="4" height="16"/>
            <rect x="14" y="4" width="4" height="16"/>
          </svg>
        </button>
        <button class="control-btn" id="resetBtn" title="Reset">
          <svg viewBox="0 0 24 24">
            <path d="M1 4v6h6M23 20v-6h-6"/>
            <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- RIGHT PANEL -->
    <div class="right-panel" id="tasksPanel">
      <div class="tasks-header">
        <div class="tasks-header-title">Tasks</div>
        <button class="collapse-btn" id="toggleTasksBtn" title="Collapse">
          <svg viewBox="0 0 24 24">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
        </button>
      </div>

      <input type="text" class="add-task-input" id="addTaskInput" placeholder="Add new task..." />

      <div class="tasks-content" id="tasksList">
        <div class="tasks-empty">No tasks yet. Add one to get started!</div>
      </div>
    </div>
  </div>

  <script>
    // ═══════════════════════════════════════════════════════════════
    // STATE & QUOTES
    // ═══════════════════════════════════════════════════════════════

    const QUOTES = [
      { text: "The only way to do great work is to love what you do.", author: "Steve Jobs" },
      { text: "Focus is the gateway to success.", author: "Brian Tracy" },
      { text: "Don't watch the clock; do what it does. Keep going.", author: "Sam Levenson" },
      { text: "Success is not final, failure is not fatal.", author: "Winston Churchill" },
      { text: "The future depends on what you do today.", author: "Mahatma Gandhi" },
      { text: "Excellence is not a destination; it is a continuous journey.", author: "Brian Tracy" },
      { text: "Start where you are. Use what you have. Do what you can.", author: "Arthur Ashe" },
      { text: "You are what you do, not what you say you'll do.", author: "C.G. Jung" },
    ];

    let timerState = {
      mode: 'work',
      timeRemaining: 25 * 60,
      sessionCount: 1,
      totalSessions: 4,
      isRunning: false,
    };

    let settings = {
      workDuration: 25 * 60,
      shortBreakDuration: 5 * 60,
      longBreakDuration: 15 * 60,
    };

    let tasks = JSON.parse(localStorage.getItem('planflow-tasks') || '[]');
    let currentQuote = QUOTES[Math.floor(Math.random() * QUOTES.length)];
    let timerInterval = null;

    // ═══════════════════════════════════════════════════════════════
    // DOM REFERENCES
    // ═══════════════════════════════════════════════════════════════

    const timerDisplay = document.getElementById('timerDisplay');
    const sessionMode = document.getElementById('sessionMode');
    const sessionCount = document.getElementById('sessionCount');
    const quoteText = document.getElementById('quoteText');
    const quoteAuthor = document.getElementById('quoteAuthor');
    const playBtn = document.getElementById('playBtn');
    const resetBtn = document.getElementById('resetBtn');
    const closeBtn = document.getElementById('closeBtn');
    const tasksPanel = document.getElementById('tasksPanel');
    const toggleTasksBtn = document.getElementById('toggleTasksBtn');
    const tasksList = document.getElementById('tasksList');
    const addTaskInput = document.getElementById('addTaskInput');
    const settingsBtn = document.getElementById('settingsBtn');

    // ═══════════════════════════════════════════════════════════════
    // TIMER LOGIC
    // ═══════════════════════════════════════════════════════════════

    const formatTime = (seconds) => {
      const mins = Math.floor(seconds / 60);
      const secs = seconds % 60;
      return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
    };

    const updateDisplay = () => {
      timerDisplay.textContent = formatTime(timerState.timeRemaining);
      sessionCount.textContent = `${timerState.sessionCount}/${timerState.totalSessions}`;
      
      const modes = { work: 'Focus Session', shortBreak: 'Short Break', longBreak: 'Long Break' };
      sessionMode.textContent = modes[timerState.mode];

      const playIcon = playBtn.querySelector('.play-icon');
      const pauseIcon = playBtn.querySelector('.pause-icon');
      if (timerState.isRunning) {
        playIcon.style.display = 'none';
        pauseIcon.style.display = 'block';
      } else {
        playIcon.style.display = 'block';
        pauseIcon.style.display = 'none';
      }
    };

    const tick = () => {
      if (timerState.timeRemaining > 0) {
        timerState.timeRemaining--;
        updateDisplay();
      } else {
        timerState.isRunning = false;
        nextSession();
      }
    };

    const togglePlay = () => {
      if (timerState.isRunning) {
        timerState.isRunning = false;
        if (timerInterval) clearInterval(timerInterval);
      } else {
        timerState.isRunning = true;
        timerInterval = setInterval(tick, 1000);
      }
      updateDisplay();
    };

    const resetTimer = () => {
      timerState.isRunning = false;
      if (timerInterval) clearInterval(timerInterval);
      timerState.mode = 'work';
      timerState.sessionCount = 1;
      timerState.timeRemaining = settings.workDuration;
      updateDisplay();
    };

    const nextSession = () => {
      if (timerState.mode === 'work') {
        timerState.sessionCount++;
        if (timerState.sessionCount % timerState.totalSessions === 0) {
          timerState.mode = 'longBreak';
          timerState.timeRemaining = settings.longBreakDuration;
        } else {
          timerState.mode = 'shortBreak';
          timerState.timeRemaining = settings.shortBreakDuration;
        }
      } else {
        timerState.mode = 'work';
        timerState.timeRemaining = settings.workDuration;
      }
      currentQuote = QUOTES[Math.floor(Math.random() * QUOTES.length)];
      updateQuote();
      updateDisplay();
    };

    // ═══════════════════════════════════════════════════════════════
    // QUOTE MANAGEMENT
    // ═══════════════════════════════════════════════════════════════

    const updateQuote = () => {
      quoteText.textContent = `"${currentQuote.text}"`;
      quoteAuthor.textContent = `— ${currentQuote.author}`;
    };

    // ═══════════════════════════════════════════════════════════════
    // TASKS MANAGEMENT
    // ═══════════════════════════════════════════════════════════════

    const saveTasks = () => {
      localStorage.setItem('planflow-tasks', JSON.stringify(tasks));
    };

    const renderTasks = () => {
      if (tasks.length === 0) {
        tasksList.innerHTML = '<div class="tasks-empty">No tasks yet. Add one to get started!</div>';
        return;
      }

      tasksList.innerHTML = tasks.map(task => `
        <div class="task-item ${task.completed ? 'completed' : ''}" data-id="${task.id}">
          <input type="checkbox" class="task-checkbox" ${task.completed ? 'checked' : ''} />
          <div class="task-text">${task.text}</div>
          <button class="task-delete" title="Delete">
            <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
          </button>
        </div>
      `).join('');

      // Attach event listeners
      tasksList.querySelectorAll('.task-checkbox').forEach(checkbox => {
        checkbox.addEventListener('change', (e) => {
          const id = e.target.closest('.task-item').getAttribute('data-id');
          const task = tasks.find(t => t.id === id);
          if (task) {
            task.completed = e.target.checked;
            saveTasks();
            renderTasks();
          }
        });
      });

      tasksList.querySelectorAll('.task-delete').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const id = e.target.closest('.task-item').getAttribute('data-id');
          tasks = tasks.filter(t => t.id !== id);
          saveTasks();
          renderTasks();
        });
      });
    };

    const addTask = (text) => {
      if (!text.trim()) return;
      tasks.push({
        id: Date.now().toString(),
        text: text.trim(),
        completed: false,
      });
      saveTasks();
      renderTasks();
      addTaskInput.value = '';
      addTaskInput.focus();
    };

    // ═══════════════════════════════════════════════════════════════
    // UI INTERACTIONS
    // ═══════════════════════════════════════════════════════════════

    playBtn.addEventListener('click', togglePlay);
    resetBtn.addEventListener('click', resetTimer);
    closeBtn.addEventListener('click', () => {
      if (window.electron) window.electron.closeWidget();
    });

    toggleTasksBtn.addEventListener('click', () => {
      tasksPanel.classList.toggle('collapsed');
    });

    addTaskInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        addTask(addTaskInput.value);
      }
    });

    // ═══════════════════════════════════════════════════════════════
    // INITIALIZATION
    // ═══════════════════════════════════════════════════════════════

    updateQuote();
    updateDisplay();
    renderTasks();
  </script>
</body>
</html>
