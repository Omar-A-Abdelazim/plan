<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PlanFlow Pomodoro Widget</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Noto+Naskh+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --primary:  #7B2FBE;
      --secondary:#4361EE;
      --accent:   #F77F00;
      --fg:       rgba(235, 232, 255, 0.95);
      --fg-muted: rgba(180, 170, 220, 0.7);
      --border:   rgba(123, 47, 190, 0.35);
      --muted-bg: rgba(255,255,255,0.06);
    }

    html, body {
      background: rgba(15, 15, 26, 0.45);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      overflow: hidden;
      user-select: none;
      -webkit-font-smoothing: antialiased;
      font-family: 'Geist', system-ui, sans-serif;
      color: var(--fg);
    }

    /* ── Glass card ─────────────────────────────── */
    .card {
      width: 300px;
      height: 100%;
      background: rgba(15, 15, 26, 0.45);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(123, 47, 190, 0.3);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.08);
      -webkit-app-region: drag;
      display: flex;
      flex-direction: column;
    }

    /* ── Compact view ────────────────────────────── */
    .compact-view {
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      flex: 1;
      -webkit-app-region: drag;
    }

    .compact-timer {
      font-size: 48px;
      font-weight: 700;
      letter-spacing: -2px;
      font-variant-numeric: tabular-nums;
      line-height: 1;
      flex-shrink: 0;
      text-align: center;
    }

    .compact-right {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .compact-quote {
      font-size: 11px;
      color: var(--fg-muted);
      line-height: 1.4;
      text-align: center;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      font-style: italic;
    }

    .compact-actions {
      display: flex;
      gap: 6px;
      align-items: center;
      justify-content: center;
      -webkit-app-region: no-drag;
    }

    /* ── Full view ───────────────────────────────── */
    .full-view { 
      display: none; 
      flex-direction: column;
      flex: 1;
    }

    .full-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 14px 10px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }

    .session-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--fg);
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .full-timer-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 18px 16px 12px;
      gap: 6px;
    }

    .full-timer {
      font-size: 54px;
      font-weight: 700;
      letter-spacing: -2px;
      font-variant-numeric: tabular-nums;
      line-height: 1;
    }

    .session-counter {
      font-size: 11px;
      color: var(--fg-muted);
    }

    /* progress bar */
    .prog-wrap {
      padding: 0 16px;
      margin-bottom: 12px;
    }
    .prog-track {
      height: 3px;
      background: rgba(255,255,255,0.08);
      border-radius: 99px;
      overflow: hidden;
    }
    .prog-fill {
      height: 100%;
      border-radius: 99px;
      transition: width 0.5s linear;
      background: var(--primary);
    }

    /* controls */
    .controls {
      display: flex;
      justify-content: center;
      gap: 10px;
      padding: 0 16px 14px;
      -webkit-app-region: no-drag;
    }

    /* quote full */
    .quote-wrap {
      margin: 0 14px 12px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 10px;
      padding: 10px 12px;
      animation: fadeUp 0.4s ease;
    }
    .quote-wrap[dir="rtl"] {
      font-family: 'Noto Naskh Arabic', system-ui, sans-serif;
      text-align: right;
    }
    .q-text  { font-size: 11px; font-style: italic; line-height: 1.5; color: var(--fg); margin-bottom: 4px; }
    .q-author{ font-size: 10px; color: var(--fg-muted); }

    /* lang toggle */
    .lang-row {
      display: flex;
      justify-content: center;
      gap: 6px;
      padding: 0 16px 14px;
      -webkit-app-region: no-drag;
    }

    /* ── Shared button styles ────────────────────── */
    .icon-btn {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--fg-muted);
      cursor: pointer;
      width: 26px; height: 26px;
      border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
      flex-shrink: 0;
      -webkit-app-region: no-drag;
    }
    .icon-btn:hover { color: var(--fg); background: rgba(255,255,255,0.13); }

    .ctrl-btn {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--fg-muted);
      cursor: pointer;
      width: 38px; height: 38px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .ctrl-btn:hover { color: var(--fg); background: rgba(255,255,255,0.13); }
    .ctrl-btn.play {
      width: 46px; height: 46px; border-radius: 12px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      border: none; color: #fff;
    }
    .ctrl-btn.play:hover { opacity: 0.88; transform: scale(1.04); }

    .lang-btn {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--fg-muted);
      cursor: pointer;
      padding: 4px 10px;
      border-radius: 7px;
      font-size: 10px; font-weight: 500;
      display: flex; align-items: center; gap: 4px;
      transition: all 0.15s;
    }
    .lang-btn.active {
      background: rgba(123,47,190,0.25);
      border-color: var(--primary);
      color: #c39af0;
    }

    /* color variants */
    .work      { color: #c39af0; }
    .shortBreak{ color: #7ec8f7; }
    .longBreak { color: #fbb96b; }
    .prog-short{ background: var(--secondary); }
    .prog-long { background: var(--accent); }

    svg { width: 14px; height: 14px; stroke: currentColor; fill: none;
          stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    svg.fill { fill: currentColor; stroke: none; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(5px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
<div class="card" id="card">

  <!-- ═══ COMPACT VIEW ═══ -->
  <div class="compact-view" id="compactView">
    <div class="compact-timer work" id="cTimer">25:00</div>
    <div class="compact-right">
      <div class="compact-quote" id="cQuote">"The secret of getting ahead is getting started."</div>
      <div class="compact-actions">
        <button class="icon-btn" id="expandBtn" title="Expand">
          <svg viewBox="0 0 24 24"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
        </button>
      </div>
    </div>
  </div>

  <!-- ═══ FULL VIEW ═══ -->
  <div class="full-view" id="fullView">
    <div class="full-header">
      <div class="session-label">
        <span id="fIcon">🧠</span>
        <span id="fLabel">Focus</span>
      </div>
      <div style="display:flex;gap:6px;-webkit-app-region:no-drag">
        <button class="icon-btn" id="collapseBtn" title="Compact">
          <svg viewBox="0 0 24 24"><polyline points="4 14 10 14 10 20"/><polyline points="20 10 14 10 14 4"/><line x1="10" y1="14" x2="3" y2="21"/><line x1="21" y1="3" x2="14" y2="10"/></svg>
        </button>
        <button class="icon-btn" id="fClose" title="Close">
          <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
    </div>

    <div class="full-timer-wrap">
      <div class="full-timer work" id="fTimer">25:00</div>
      <div class="session-counter">Session <span id="fSessNum">1</span> of <span id="fSessTotal">4</span></div>
    </div>

    <div class="prog-wrap">
      <div class="prog-track"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
    </div>

    <div class="controls">
      <button class="ctrl-btn" id="fReset" title="Reset">
        <svg viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
      </button>
      <button class="ctrl-btn play" id="fPlay">
        <svg class="fill" viewBox="0 0 24 24" style="width:18px;height:18px"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      </button>
    </div>

    <div class="quote-wrap" id="fQuoteWrap" dir="ltr">
      <p class="q-text"   id="fQuoteText">"The secret of getting ahead is getting started."</p>
      <p class="q-author" id="fQuoteAuthor">— Mark Twain</p>
    </div>

    <div class="lang-row">
      <button class="lang-btn active" id="langEn">🇬🇧 EN</button>
      <button class="lang-btn"        id="langAr">🇪🇬 AR</button>
    </div>
  </div>

</div>
<script>
// ── Quotes ────────────────────────────────────────────────────────────
const Q_EN = [
  { text:'The secret of getting ahead is getting started.', author:'Mark Twain' },
  { text:'Success is not final, failure is not fatal.', author:'Winston Churchill' },
  { text:"Don't watch the clock; do what it does. Keep going.", author:'Sam Levenson' },
  { text:'The future depends on what you do today.', author:'Mahatma Gandhi' },
  { text:'Focus on being productive instead of busy.', author:'Tim Ferriss' },
  { text:'The expert in anything was once a beginner.', author:'Helen Hayes' },
  { text:'Do something today that your future self will thank you for.', author:'Sean Flanery' },
  { text:'Believe you can and you\'re halfway there.', author:'Theodore Roosevelt' },
  { text:'Excellence is not a destination; it is a continuous journey.', author:'Brian Tracy' },
  { text:'You are what you do, not what you say you\'ll do.', author:'C.G. Jung' },
  { text:'Learning is not attained by chance; it must be sought with ardor.', author:'Abigail Adams' },
  { text:'An investment in knowledge pays the best interest.', author:'Benjamin Franklin' },
  { text:'The mind is not a vessel to be filled, but a fire to be kindled.', author:'Plutarch' },
  { text:'Education is the passport to the future.', author:'Malcolm X' },
  { text:'Start where you are. Use what you have. Do what you can.', author:'Arthur Ashe' },
];

const Q_AR = [
  { text:'فَإِنَّ مَعَ الْعُسْرِ يُسْرًا ۝ إِنَّ مَعَ الْعُسْرِ يُسْرًا', author:'القرآن الكريم — سورة الانشراح' },
  { text:'وَقُل رَّبِّ زِدْنِي عِلْمًا', author:'القرآن الكريم — سورة طه' },
  { text:'يَرْفَعِ اللَّهُ الَّذِينَ آمَنُوا مِنكُمْ وَالَّذِينَ أُوتُوا الْعِلْمَ دَرَجَاتٍ', author:'القرآن الكريم — سورة المجادلة' },
  { text:'مَن سَلَكَ طَريقًا يَلتَمِسُ فيهِ عِلمًا سَهَّلَ اللَّهُ لَهُ طَريقًا إلى الجَنَّةِ', author:'صحيح مسلم' },
  { text:'اطلُبوا العِلمَ مِنَ المَهدِ إلى اللَّحد', author:'حكمة إسلامية' },
  { text:'مَن جَدَّ وَجَد، وَمَن زَرَعَ حَصَد', author:'حكمة عربية' },
  { text:'العِلمُ نُورٌ وَالجَهلُ ظَلامٌ', author:'حكمة عربية' },
  { text:'على قَدرِ أهلِ العَزمِ تَأتي العَزائِم\nوتَأتي على قَدرِ الكِرامِ المَكارِم', author:'المتنبي' },
  { text:'وَإِذا كانَت النُّفوسُ كِباراً\nتَعِبَت في مُرادِها الأَجسامُ', author:'المتنبي' },
  { text:'أنا مَن نَظَرَ الأَعمى إِلى أَدَبي\nوَأَسمَعَت كَلِماتي مَن بِهِ صَمَم', author:'المتنبي' },
  { text:'اِصبِر على مَضَضِ الإِدلاجِ في السَّحَرِ\nوَما اِفتِقارُكَ إِلّا فَقرُ مَن قَدَرا', author:'أحمد شوقي' },
  { text:'سَلامٌ مِن صَبا بَردى أَرَقُّ\nوَدَمعٌ لا يُكَفكَفُ يا دِمَشق', author:'أحمد شوقي' },
  { text:'الصَّبرُ مِفتاحُ الفَرَج', author:'ابن القيم الجوزية' },
  { text:'شَغَلتُ قَلبي بِالعِلمِ فَفاضَ\nوَكُنتُ قَبلَ ذلِكَ كَالمَيِّت', author:'ابن القيم الجوزية' },
  { text:'الوَقتُ كَالسَّيف إِن لَم تَقطَعهُ قَطَعَك', author:'حكمة عربية' },
  { text:'لا تَحقِرَنَّ صَغيرةً إِنَّ الجِبالَ مِن الحَصى', author:'حكمة عربية' },
  { text:'النَّجاحُ لَيسَ نِهايةً، والفَشَلُ لَيسَ قاتِلاً، الشَّجاعَةُ هِيَ ما يُهِمّ', author:'حكمة عربية' },
];

// ── State ─────────────────────────────────────────────────────────────
let isFullMode  = false;
let isRunning   = false;
let sessionType = 'work';
let sessionCount= 0;
let totalSess   = 4;
let language    = localStorage.getItem('planflow-widget-language') || 'en';
let durations   = { work: 25*60, shortBreak: 5*60, longBreak: 15*60 };
let currentTime = durations.work;
let interval    = null;
let currentQuote= Q_EN[0];

// ── Helpers ───────────────────────────────────────────────────────────
const fmt = s => `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;

function randomQuote() {
  const pool = language === 'ar' ? Q_AR : Q_EN;
  return pool[Math.floor(Math.random() * pool.length)];
}

function modeClass() {
  return sessionType === 'work' ? 'work' : sessionType === 'shortBreak' ? 'shortBreak' : 'longBreak';
}

// ── Render ────────────────────────────────────────────────────────────
function render() {
  const mc = modeClass();
  const timeStr = fmt(currentTime);
  const dur = durations[sessionType];
  const pct = ((dur - currentTime) / dur * 100).toFixed(1);

  // compact
  cTimer.textContent = timeStr;
  cTimer.className = `compact-timer ${mc}`;

  // compact quote (no quotes/author in compact, just text snippet)
  cQuote.textContent = `"${currentQuote.text.slice(0,80)}${currentQuote.text.length>80?'…':''}"`;
  if (language === 'ar') {
    cQuote.style.direction = 'rtl';
    cQuote.style.fontFamily = "'Noto Naskh Arabic', system-ui, sans-serif";
  } else {
    cQuote.style.direction = 'ltr';
    cQuote.style.fontFamily = "'Geist', system-ui, sans-serif";
  }

  // full
  fTimer.textContent = timeStr;
  fTimer.className = `full-timer ${mc}`;
  fSessNum.textContent   = sessionCount + 1;
  fSessTotal.textContent = totalSess;
  progFill.style.width   = pct + '%';
  progFill.className = `prog-fill${sessionType==='shortBreak' ? ' prog-short' : sessionType==='longBreak' ? ' prog-long' : ''}`;

  const icons = { work:'🧠', shortBreak:'☕', longBreak:'🌙' };
  const labels = { work:'Focus', shortBreak:'Short Break', longBreak:'Long Break' };
  fIcon.textContent  = icons[sessionType];
  fLabel.textContent = labels[sessionType];

  fPlay.innerHTML = isRunning
    ? '<svg viewBox="0 0 24 24" style="width:18px;height:18px"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>'
    : '<svg class="fill" viewBox="0 0 24 24" style="width:18px;height:18px"><polygon points="5 3 19 12 5 21 5 3"/></svg>';

  // full quote
  fQuoteText.textContent   = `"${currentQuote.text}"`;
  fQuoteAuthor.textContent = `— ${currentQuote.author}`;
  if (language === 'ar') {
    fQuoteWrap.setAttribute('dir','rtl');
    fQuoteWrap.style.fontFamily = "'Noto Naskh Arabic', system-ui, sans-serif";
  } else {
    fQuoteWrap.setAttribute('dir','ltr');
    fQuoteWrap.style.fontFamily = "'Geist', system-ui, sans-serif";
  }

  langEn.className = `lang-btn${language === 'en' ? ' active' : ''}`;
  langAr.className = `lang-btn${language === 'ar' ? ' active' : ''}`;
}

// ── Mode toggle ───────────────────────────────────────────────────────
function setMode(full) {
  isFullMode = full;
  compactView.style.display = full ? 'none'  : 'flex';
  fullView.style.display    = full ? 'flex'  : 'none';
  if (window.electron) window.electron.setWidgetMode(full ? 'full' : 'compact');
  render();
}

// ── Timer logic ───────────────────────────────────────────────────────
function tick() {
  if (currentTime > 0) {
    currentTime--;
    saveState();
    render();
  } else {
    clearInterval(interval); interval = null; isRunning = false;
    if (window.electron) {
      const title = sessionType === 'work' ? '⏱️ Session done!' : '✨ Break over!';
      const body  = sessionType === 'work' ? 'Time for a break!' : 'Back to work!';
      window.electron.notify(title, body);
    }
    if (sessionType === 'work') {
      sessionCount++;
      sessionType = sessionCount % totalSess === 0 ? 'longBreak' : 'shortBreak';
    } else {
      sessionType = 'work';
    }
    currentTime  = durations[sessionType];
    currentQuote = randomQuote();
    saveState(); render();
  }
}

function togglePlay() {
  if (isRunning) {
    clearInterval(interval); interval = null; isRunning = false;
  } else {
    isRunning = true;
    interval  = setInterval(tick, 1000);
  }
  saveState(); render();
}

function resetTimer() {
  clearInterval(interval); interval = null;
  isRunning = false; sessionType = 'work'; sessionCount = 0;
  currentTime  = durations.work;
  currentQuote = randomQuote();
  saveState(); render();
}

function saveState() {
  localStorage.setItem('pomodoroState', JSON.stringify({
    timeLeft: currentTime, sessionType, isRunning, sessionCount
  }));
}

// Sync from main app every second
setInterval(() => {
  try {
    const s = JSON.parse(localStorage.getItem('pomodoroState') || '{}');
    if (s.timeLeft     !== undefined) currentTime  = s.timeLeft;
    if (s.sessionType  !== undefined) sessionType  = s.sessionType;
    if (s.sessionCount !== undefined) sessionCount = s.sessionCount;
    if (s.isRunning    !== undefined && s.isRunning !== isRunning) {
      isRunning = s.isRunning;
      if (isRunning && !interval) interval = setInterval(tick, 1000);
      if (!isRunning && interval) { clearInterval(interval); interval = null; }
    }
    render();
  } catch(e){}
}, 1000);

// ── DOM refs ──────────────────────────────────────────────────────────
const compactView = document.getElementById('compactView');
const fullView    = document.getElementById('fullView');
const cTimer      = document.getElementById('cTimer');
const cQuote      = document.getElementById('cQuote');
const expandBtn   = document.getElementById('expandBtn');
const collapseBtn = document.getElementById('collapseBtn');
const fClose      = document.getElementById('fClose');
const fTimer      = document.getElementById('fTimer');
const fSessNum    = document.getElementById('fSessNum');
const fSessTotal  = document.getElementById('fSessTotal');
const progFill    = document.getElementById('progFill');
const fPlay       = document.getElementById('fPlay');
const fReset      = document.getElementById('fReset');
const fIcon       = document.getElementById('fIcon');
const fLabel      = document.getElementById('fLabel');
const fQuoteWrap  = document.getElementById('fQuoteWrap');
const fQuoteText  = document.getElementById('fQuoteText');
const fQuoteAuthor= document.getElementById('fQuoteAuthor');
const langEn      = document.getElementById('langEn');
const langAr      = document.getElementById('langAr');

// ── Events ────────────────────────────────────────────────────────────
expandBtn  .addEventListener('click', () => setMode(true));
collapseBtn.addEventListener('click', () => setMode(false));
fPlay      .addEventListener('click', togglePlay);
fReset     .addEventListener('click', resetTimer);
fClose     .addEventListener('click', () => { if(window.electron) window.electron.closeWidget(); });
langEn     .addEventListener('click', () => { language='en'; localStorage.setItem('planflow-widget-language','en'); currentQuote=randomQuote(); render(); });
langAr     .addEventListener('click', () => { language='ar'; localStorage.setItem('planflow-widget-language','ar'); currentQuote=randomQuote(); render(); });

// ── Init ──────────────────────────────────────────────────────────────
currentQuote = randomQuote();
setMode(false);
render();
</script>
</body>
</html>
